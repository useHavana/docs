openapi: 3.1.0

info:
  title: Havana Public API
  version: 1.0.0-draft
  description: |
    Havana's CRM-agnostic public API: a read surface plus thin webhooks for
    writing Havana engagement data back into your own CRM, and a
    campaign-scoped upload endpoint for pushing new leads into Havana.

    ## The daily write-back model

    The primary integration pattern is a **daily delta poll**:

    1. Call `GET /api/v1/leads?updated_since=<last poll>` and page through the
       results with `cursor`.
    2. Upsert each lead into your CRM keyed on `external_id` — the record ID
       *your* CRM assigned, which Havana captured at import time and returns on
       every record and event.
    3. Persist the `updated_at` of the last record you processed (minus a small
       overlap window) as the next poll's `updated_since`.

    **Pull is the backbone; webhooks are accelerators.** Webhook events are
    thin — event type, IDs, a per-lead monotonic sequence number, and
    `occurred_at` — and never carry full resource state. On receipt, fetch the
    referenced resource (or just run your delta poll) to get the source of
    truth. A missed webhook is never data loss: your next `updated_since` poll
    carries the same state.

    ## Asynchronous classification

    Havana classifies engagements (calls, messages, emails) **asynchronously**.
    Every classifiable record carries a `classification_status` of `pending` or
    `completed` and a nullable `intent`:

    * The `call.completed` webhook fires immediately when a call ends, with
      `classification_status: pending` and `intent: null`.
    * A `lead.classified` event follows once the classifier lands — typically
      within minutes.
    * Late classifications **bump the lead's `updated_at`**, so the lead
      reappears in your next `updated_since` poll and the re-poll catches the
      final intent. Always upsert: the same lead can (and will) appear in
      multiple polls.

    ## Conventions

    * All endpoints live under the `/api/v1` path prefix.
    * Authenticate with a per-team API key: `Authorization: Bearer hav_...`.
    * Every list endpoint uses cursor pagination: pass `cursor` and `limit`,
      read `next_cursor` from the response (`null` means the end).
    * Every non-2xx response uses a single error envelope:
      `{code, message, detail}`.
    * Webhook payloads are signed with HMAC-SHA256, delivered in the
      `X-Havana-Signature` header. Verify before trusting the payload.
  license:
    name: Proprietary
    url: https://www.usehavana.com/terms
  contact:
    name: Havana Support
    email: support@usehavana.com
    url: https://www.usehavana.com

servers:
  - url: https://api.usehavana.com
    description: Production

security:
  - bearerAuth: []

tags:
  - name: Leads
    description: >-
      Lead records and their engagement timelines. The delta-sync list endpoint
      is the backbone of the integration; detail endpoints expose status,
      counts, activities, and the full interleaved engagement thread.
  - name: Campaigns
    description: >-
      Campaign discovery and campaign-scoped lead upload. Campaigns are the
      unit of outreach configuration; leads are uploaded into a specific
      campaign and worked according to that campaign's schedule and rules.
  - name: Calls
    description: >-
      Voice call detail: transcript, recording, duration, classification,
      callback flag, and transfer outcome.
  - name: Appointments
    description: >-
      Appointments booked for a lead during calls, messaging conversations, or
      through a booking page.
  - name: Webhooks
    description: >-
      Thin event notifications delivered to your endpoint. Events carry IDs and
      a per-lead monotonic sequence number — not full resource state. The pull
      API is the source of truth.

paths:
  /api/v1/leads:
    get:
      operationId: listLeads
      tags: [Leads]
      summary: List leads (delta sync)
      description: |
        Returns the team's leads ordered by `updated_at` ascending, filtered by
        `updated_since`. This endpoint is the backbone of the integration:
        customers poll it (typically daily) to write lead data back into their
        own CRM.

        **Delta sync semantics.** Any change to a lead bumps its `updated_at`,
        including *late-arriving classifications*: classification is
        asynchronous, so a call may complete (and the lead surface in one poll)
        before its intent is classified. When the classifier lands, the lead's
        `updated_at` is bumped again, so the lead reappears in your next
        `updated_since` poll and the re-poll catches the final classification.
        Always upsert on `external_id` — the same lead can (and will) appear in
        multiple polls.

        Recommended pattern: persist the `updated_at` of the last record you
        processed and use it (minus a small overlap window, e.g. 5 minutes) as
        the next poll's `updated_since`. Use `cursor` to page through large
        result sets within a single poll.
      parameters:
        - name: updated_since
          in: query
          required: false
          description: >-
            Only return leads whose `updated_at` is at or after this RFC 3339
            timestamp. Omit to page through the full lead set (initial
            backfill).
          schema:
            type: string
            format: date-time
          example: '2026-06-09T00:00:00Z'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: A page of leads updated since the requested timestamp.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedLeads'
              example:
                data:
                  - id: led20260512zr7k2m4xq9p3v
                    external_id: 00Q5f000001AbCdEAV
                    status: interested
                    intent: voice_interested_with_booked_time
                    first_name: Maria
                    last_name: Santos
                    email: maria.santos@example.com
                    phone_number: '+13125550148'
                    import_source: salesforce
                    external_status: Working - Contacted
                    external_synced_at: '2026-06-09T14:02:11Z'
                    time_zone: America/Chicago
                    state: IL
                    unsubscribed: false
                    bounced: false
                    invalid_number: false
                    is_inbound: false
                    is_test: false
                    custom_fields:
                      inquiry_age_c: '14'
                      program_of_interest: RN-to-BSN
                    counts:
                      calls: 4
                      calls_answered: 1
                      emails_sent: 3
                      emails_received: 1
                      email_opens: 5
                      messages_sent: 2
                      messages_received: 1
                    created_at: '2026-05-12T09:30:00Z'
                    updated_at: '2026-06-09T18:45:31Z'
                  - id: led20260602zb8n3k7w1q5fd
                    external_id: 00Q5f000001XyZwEAV
                    status: contacted
                    intent: null
                    first_name: Devon
                    last_name: Carter
                    email: devon.carter@example.com
                    phone_number: '+16145550722'
                    import_source: salesforce
                    external_status: null
                    external_synced_at: null
                    time_zone: America/New_York
                    state: OH
                    unsubscribed: false
                    bounced: false
                    invalid_number: false
                    is_inbound: false
                    is_test: false
                    custom_fields:
                      program_of_interest: BSN Online
                    counts:
                      calls: 1
                      calls_answered: 0
                      emails_sent: 1
                      emails_received: 0
                      email_opens: 0
                      messages_sent: 2
                      messages_received: 0
                    created_at: '2026-06-02T11:30:45Z'
                    updated_at: '2026-06-09T19:01:38Z'
                next_cursor: eyJ1cGRhdGVkX2F0IjoiMjAyNi0wNi0wOVQxOTowMTozOFoifQ
                has_more: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'

  /api/v1/leads/{external_id}:
    get:
      operationId: getLead
      tags: [Leads]
      summary: Get a lead
      description: |
        Returns a single lead by `external_id` — the record ID of the lead in
        *your* CRM, supplied when the lead was created in Havana. The response
        includes the lead's current status, latest classified intent, and
        engagement counts.

        This is the source of truth for a lead's current state. Webhook events
        are thin notifications; after receiving one, fetch this endpoint to get
        the full, current record.
      parameters:
        - $ref: '#/components/parameters/ExternalId'
      responses:
        '200':
          description: The lead.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Lead'
              example:
                id: led20260512zr7k2m4xq9p3v
                external_id: 00Q5f000001AbCdEAV
                status: interested
                intent: voice_interested_with_booked_time
                first_name: Maria
                last_name: Santos
                email: maria.santos@example.com
                phone_number: '+13125550148'
                import_source: salesforce
                external_status: Working - Contacted
                external_synced_at: '2026-06-09T14:02:11Z'
                time_zone: America/Chicago
                state: IL
                unsubscribed: false
                bounced: false
                invalid_number: false
                is_inbound: false
                is_test: false
                custom_fields:
                  inquiry_age_c: '14'
                  program_of_interest: RN-to-BSN
                counts:
                  calls: 4
                  calls_answered: 1
                  emails_sent: 3
                  emails_received: 1
                  email_opens: 5
                  messages_sent: 2
                  messages_received: 1
                created_at: '2026-05-12T09:30:00Z'
                updated_at: '2026-06-09T18:45:31Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'

  /api/v1/leads/{external_id}/activities:
    get:
      operationId: listLeadActivities
      tags: [Leads]
      summary: List a lead's activities
      description: |
        Returns the lead's activity log: calls, messages (SMS/WhatsApp),
        emails, and status transitions, newest first.

        **Classification is asynchronous.** Every call, message, and email row
        carries a `classification_status` of `pending` or `completed` and a
        nullable `intent`. A `call.completed` webhook fires immediately with
        the activity still `pending`; when the classifier lands, the row flips
        to `completed`, `intent` is populated, and the parent lead's
        `updated_at` is bumped so delta polls pick up the change. Do not treat
        `pending` rows as final.
      parameters:
        - $ref: '#/components/parameters/ExternalId'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: A page of the lead's activities, newest first.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedActivities'
              example:
                data:
                  - id: act20260609zq8w3e7r2t9yu
                    lead_id: led20260512zr7k2m4xq9p3v
                    external_id: 00Q5f000001AbCdEAV
                    type: call
                    channel: voice
                    direction: outbound
                    occurred_at: '2026-06-09T14:21:47Z'
                    classification_status: pending
                    intent: null
                    summary: null
                    call_id: vca20260609z8h3n6tq2w5dy
                    message_id: null
                    email_id: null
                    from_status: null
                    to_status: null
                  - id: act20260608zw3v7n1k9j5hg
                    lead_id: led20260512zr7k2m4xq9p3v
                    external_id: 00Q5f000001AbCdEAV
                    type: status_change
                    channel: system
                    direction: null
                    occurred_at: '2026-06-08T19:06:02Z'
                    classification_status: completed
                    intent: null
                    summary: Status changed from replied to interested.
                    call_id: null
                    message_id: null
                    email_id: null
                    from_status: replied
                    to_status: interested
                  - id: act20260608zt5y8u2i6o1pa
                    lead_id: led20260512zr7k2m4xq9p3v
                    external_id: 00Q5f000001AbCdEAV
                    type: message
                    channel: sms
                    direction: inbound
                    occurred_at: '2026-06-08T19:05:12Z'
                    classification_status: completed
                    intent: messaging_interested
                    summary: Lead asked about tuition and confirmed interest.
                    call_id: null
                    message_id: msg20260608zt5y8u2i6o1pa
                    email_id: null
                    from_status: null
                    to_status: null
                next_cursor: null
                has_more: false
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'

  /api/v1/leads/{external_id}/thread:
    get:
      operationId: getLeadThread
      tags: [Leads]
      summary: Get a lead's full engagement thread
      description: |
        Returns the lead's complete engagement transcript as a single
        chronologically interleaved thread across all channels — voice calls,
        SMS, WhatsApp, and email — in the order the lead experienced them,
        oldest first.

        Each entry is a discriminated union (discriminate on `type`) carrying
        its classification (`classification_status` and nullable `intent`)
        alongside the full channel payload: call transcript, message body, or
        email body. Use this endpoint to render the whole conversation in your
        CRM's activity timeline, or to audit exactly what the AI said and when.

        The `items` array is cursor-paginated: pass `next_cursor` back as
        `cursor` to fetch the next page of entries. Lead-level fields (status,
        intent, extracted metadata) repeat on every page.
      parameters:
        - $ref: '#/components/parameters/ExternalId'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: >-
            A page of the lead's interleaved engagement thread, oldest first.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Thread'
              example:
                lead_id: led20260512zr7k2m4xq9p3v
                external_id: 00Q5f000001AbCdEAV
                status: interested
                intent: voice_interested_with_booked_time
                started_at: '2026-05-13T15:00:00Z'
                last_activity_at: '2026-06-09T14:21:47Z'
                extracted_metadata:
                  - field_name: interested_courses
                    values:
                      - RN-to-BSN
                    extracted_at: '2026-06-08T19:10:00Z'
                items:
                  - type: email
                    occurred_at: '2026-05-28T13:00:02Z'
                    classification_status: completed
                    intent: null
                    email:
                      id: eml20260528zw2e5r8t1y4ui
                      lead_id: led20260512zr7k2m4xq9p3v
                      external_id: 00Q5f000001AbCdEAV
                      direction: outbound
                      subject: Your RN-to-BSN application — next steps
                      body_text: >-
                        Hi Maria, following up on your inquiry about the
                        RN-to-BSN program...
                      from_address: advisor@school.usehavana.com
                      to_address: maria.santos@example.com
                      ccs: null
                      reply_to: null
                      message_id: <CADxyz123@mail.usehavana.com>
                      in_reply_to_message_id: null
                      sent_at: '2026-05-28T13:00:02Z'
                      open_count: 2
                      is_bounce: false
                      is_manual: false
                      classification_status: completed
                      intent: null
                      created_at: '2026-05-28T13:00:00Z'
                  - type: message
                    occurred_at: '2026-06-08T19:05:12Z'
                    classification_status: completed
                    intent: messaging_interested
                    message:
                      id: msg20260608zt5y8u2i6o1pa
                      lead_id: led20260512zr7k2m4xq9p3v
                      external_id: 00Q5f000001AbCdEAV
                      conversation_id: mcv20260608zb4n7m1k9j5hg
                      channel: sms
                      direction: inbound
                      body: Yes I'm still interested, can you call me after 2pm?
                      status: received
                      sent_at: '2026-06-08T19:05:12Z'
                      read_at: null
                      delivery_error_code: null
                      classification_status: completed
                      intent: messaging_interested
                      created_at: '2026-06-08T19:05:10Z'
                  - type: call
                    occurred_at: '2026-06-09T14:21:47Z'
                    classification_status: pending
                    intent: null
                    call:
                      id: vca20260609z8h3n6tq2w5dy
                      lead_id: led20260512zr7k2m4xq9p3v
                      external_id: 00Q5f000001AbCdEAV
                      status: completed
                      direction: outbound
                      called_at: '2026-06-09T14:21:47Z'
